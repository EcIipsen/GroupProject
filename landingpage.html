
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Solar Journey</title>
    <link rel="stylesheet" href="landing.css">
</head>
<body>
    <div class="space-background">
        <h1 class="main-title">Solar Journey</h1>

        <div class="arc-layer layer-1"></div>
        <div class="arc-layer layer-2"></div>

        <div class="solar-system">
            <div class="sun-wrapper">
                <img src="asset/sun.PNG" alt="sun">
            </div>

            <div class="pendant mercury" onclick="goToDetail('mercury')">
                <div class="string"></div> 
                <img src="asset/mercury.PNG" alt="mercury">
            </div>

            <div class="pendant venus" onclick="goToDetail('venus')">
                <div class="string"></div>
                <img src="asset/venus.png" alt="venus">
            </div>

            <div class="pendant earth" onclick="goToDetail('earth')">
                <div class="string"></div> 
                <img src="asset/earth.PNG" alt="earth">
            </div>

            <div class="pendant mars" onclick="goToDetail('mars')">
                <div class="string"></div> 
                <img src="asset/mars.png" alt="earth">
            </div>

            <div class="pendant jupiter" onclick="goToDetail('jupiter')">
                <div class="string"></div> 
                <img src="asset/jupiter.png" alt="jupiter">
            </div>
            <div class="pendant saturn" onclick="goToDetail('saturn')">
                <div class="string"></div> 
                <img src="asset/saturn.png" alt="saturn">
            </div>
            <div class="pendant uranus" onclick="goToDetail('uranus')">
                <div class="string"></div> 
                <img src="asset/uranus.png" alt="uranus">
            </div>
            <div class="pendant neptune" onclick="goToDetail('neptune')">
                <div class="string"></div> 
                <img src="asset/neptune.png" alt="neptune">
            </div>

            </div>
        
        <!-- <div id="detail-overlay" class="hidden">
            <button onclick="closeDetail()">go back</button>
            <div id="detail-content"></div>
        </div> -->
    </div>

    <script src="js/main.js"></script>
</body>
</html>
